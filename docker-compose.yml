services:
  # ============================================================
  # Gateway (Nginx) — only service exposed to host
  # ============================================================
  gateway:
    build: ./gateway
    ports:
      - "${GATEWAY_PORT:-1912}:80"
    depends_on:
      - frontend
      - identity-service
      - catalog-service
      - cart-service
      - order-service
      - payment-service
      - shipping-service
      - review-service
      - ai-service
    networks:
      - public
      - internal
    restart: unless-stopped

  # ============================================================
  # Frontend (React/Vite)
  # ============================================================
  frontend:
    build: ./frontend
    env_file:
      - ./.env
    networks:
      - internal
    restart: unless-stopped

  # ============================================================
  # Identity Service (Django DRF + MySQL)
  # ============================================================
  identity-service:
    build: ./services/identity-service
    env_file:
      - ./.env
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@${IDENTITY_DB_HOST}:${IDENTITY_DB_PORT}/${IDENTITY_DB_NAME}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY_PATH}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY_PATH}
    depends_on:
      identity-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./keys:/app/keys:ro
    networks:
      - internal
    restart: unless-stopped

  identity-mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${IDENTITY_DB_NAME}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - identity_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ============================================================
  # Catalog Service (Django DRF + PostgreSQL)
  # ============================================================
  catalog-service:
    build: ./services/catalog-service
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${CATALOG_DB_HOST}:${CATALOG_DB_PORT}/${CATALOG_DB_NAME}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY_PATH}
    depends_on:
      catalog-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./keys:/app/keys:ro
    networks:
      - internal
    restart: unless-stopped

  catalog-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${CATALOG_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - catalog_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techshop -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ============================================================
  # Cart Service (Django DRF + PostgreSQL)
  # ============================================================
  cart-service:
    build: ./services/cart-service
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${CART_DB_HOST}:${CART_DB_PORT}/${CART_DB_NAME}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY_PATH}
    depends_on:
      cart-postgres:
