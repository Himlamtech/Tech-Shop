      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  payment-mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: payment_db
      MYSQL_USER: techshop
      MYSQL_PASSWORD: techshop
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - payment_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ============================================================
  # Shipping Service (Django DRF + PostgreSQL)
  # ============================================================
