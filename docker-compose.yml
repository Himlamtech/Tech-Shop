      timeout: 5s
      retries: 10
    networks:
      - internal

# ============================================================
# Networks
# ============================================================
networks:
  public:
  internal:

# ============================================================
# Volumes
# ============================================================
volumes:
  identity_mysql_data:
  payment_mysql_data:
  catalog_postgres_data:
  cart_postgres_data:
  order_postgres_data:
  shipping_postgres_data:
  review_postgres_data:
  ai_postgres_data:
