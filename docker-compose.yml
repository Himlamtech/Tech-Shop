services:
  # ============================================================
  # Gateway (Nginx) — only service exposed to host
  # ============================================================
  gateway:
    build: ./gateway
    ports:
      - "80:80"
    depends_on:
      - frontend
      - identity-service
      - catalog-service
      - cart-service
      - order-service
      - payment-service
      - shipping-service
      - review-service
      - ai-service
    networks:
      - public
      - internal
    restart: unless-stopped

  # ============================================================
  # Frontend (React/Vite)
  # ============================================================
  frontend:
    build: ./frontend
    networks:
      - internal
    restart: unless-stopped

  # ============================================================
  # Identity Service (Django DRF + MySQL)
  # ============================================================
  identity-service:
    build: ./services/identity-service
    env_file: ./services/identity-service/.env
    depends_on:
      identity-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  identity-mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: identity_db
      MYSQL_USER: techshop
      MYSQL_PASSWORD: techshop
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - identity_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ============================================================
  # Catalog Service (Django DRF + PostgreSQL)
  # ============================================================
  catalog-service:
    build: ./services/catalog-service
    env_file: ./services/catalog-service/.env
    depends_on:
      catalog-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  catalog-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: techshop
      POSTGRES_PASSWORD: techshop
    volumes:
      - catalog_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techshop -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ============================================================
  # Cart Service (Django DRF + PostgreSQL)
  # ============================================================
  cart-service:
    build: ./services/cart-service
    env_file: ./services/cart-service/.env
    depends_on:
      cart-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  cart-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cart_db
      POSTGRES_USER: techshop
      POSTGRES_PASSWORD: techshop
    volumes:
      - cart_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techshop -d cart_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ============================================================
  # Order Service (Django DRF + PostgreSQL)
  # ============================================================
  order-service:
    build: ./services/order-service
    env_file: ./services/order-service/.env
    depends_on:
      order-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  order-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: techshop
      POSTGRES_PASSWORD: techshop
    volumes:
      - order_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techshop -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ============================================================
  # Payment Service (Django DRF + MySQL)
  # ============================================================
  payment-service:
    build: ./services/payment-service
    env_file: ./services/payment-service/.env
