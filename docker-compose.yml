    networks:
      - internal

  # ============================================================
  # Review Service (Django DRF + PostgreSQL)
  # ============================================================
  review-service:
    build: ./services/review-service
    env_file: ./services/review-service/.env
    depends_on:
      review-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  review-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: review_db
      POSTGRES_USER: techshop
      POSTGRES_PASSWORD: techshop
    volumes:
      - review_postgres_data:/var/lib/postgresql/data
    healthcheck:
