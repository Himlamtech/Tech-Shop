    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./keys:/app/keys:ro
    networks:
      - internal
    restart: unless-stopped

  cart-postgres:
